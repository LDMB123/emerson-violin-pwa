name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'npm'
      - name: Align npm version
        run: npm install -g npm@11.11.0
      - name: Runtime version check
        run: npm run runtime:check
      - uses: actions/configure-pages@v5
      - name: Install dependencies
        run: npm ci
      - name: Build site
        run: npm run build
        env:
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_SENTRY_RELEASE: ${{ github.sha }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
      - name: Summarize release checklist
        run: |
          {
            echo "## GitHub Pages Deploy"
            echo ""
            echo "- URL: ${{ steps.deployment.outputs.page_url }}"
            echo "- Checklist: docs/release-checklist.md"
            echo "- Live smoke: pending in \`live-smoke\` job"
          } >> "$GITHUB_STEP_SUMMARY"

  live-smoke:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'npm'
      - name: Align npm version
        run: npm install -g npm@11.11.0
      - name: Runtime version check
        run: npm run runtime:check
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit
      - name: Run deployed live smoke
        run: npm run test:e2e:live
        env:
          PW_BASE_URL: ${{ needs.deploy.outputs.page_url }}
          PW_SKIP_WEBSERVER: 'true'
      - name: Upload live smoke artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: live-smoke-artifacts
          path: |
            test-results
            playwright-report
          if-no-files-found: warn
