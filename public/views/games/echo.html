<section class="view game-view" id="view-game-echo" aria-label="Echo Engine Game">
    <div class="view-header floating-hud">
        <a href="#view-home" class="back-btn back-btn-hud" aria-label="Exit game">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                stroke-linejoin="round" aria-hidden="true">
                <path d="M15 18l-6-6 6-6" />
            </svg>
        </a>
        <div class="hud-center">
            <h2 class="sr-only">My Turn, Your Turn</h2>
            <div class="score-pill">
                <span class="score-icon">🎤</span>
                <span class="score-value" data-echo="score">0</span>
            </div>
        </div>
        <div class="hud-right">
            <button class="icon-btn btn-glass" aria-label="Game Settings">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 15a3 3 0 100-6 3 3 0 000 6z" />
                    <path
                        d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z" />
                </svg>
            </button>
        </div>
    </div>

    <div class="game-container full-bleed">
        <canvas id="echo-canvas" class="game-canvas"></canvas>
        <div class="curtain glass center-content" data-echo="curtain">
            <div class="game-intro">
                <h3>My Turn, Your Turn</h3>
                <p>Listen closely, then play the rhythm back.</p>
                <button class="btn btn-primary btn-start btn-lg" data-echo="start">Start Listening</button>
            </div>
        </div>
    </div>
</section>
